name: Release Windows Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build and publish, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Validate tag and package versions
        id: version
        shell: pwsh
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          $tag = $env:REQUESTED_TAG
          if ($tag -notmatch '^v(?<version>[0-9]+\.[0-9]+\.[0-9]+)$') {
            throw "Release tag must use vX.Y.Z format; received '$tag'"
          }

          $version = $Matches.version
          $rootVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $desktopVersion = (Get-Content desktop/package.json -Raw | ConvertFrom-Json).version
          if ($rootVersion -ne $version -or $desktopVersion -ne $version) {
            throw "Tag $tag does not match package versions: root=$rootVersion desktop=$desktopVersion"
          }
          if ((git tag --list $tag) -ne $tag) {
            throw "Tag $tag does not exist in the checked-out repository"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run production checks
        run: npm test

      - name: Build Windows installer
        run: npm run desktop:dist

      - name: Generate checksums
        id: assets
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $installer = (Resolve-Path "release/GTD-Flow-Setup-$env:VERSION.exe").Path
          $blockmap = (Resolve-Path "release/GTD-Flow-Setup-$env:VERSION.exe.blockmap").Path
          $checksum = Join-Path (Resolve-Path release).Path "SHA256SUMS.txt"
          @($installer, $blockmap) |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_).Hash.ToLowerInvariant()
              "$hash  $([System.IO.Path]::GetFileName($_))"
            } |
            Set-Content -Path $checksum -Encoding ascii

          "installer=$installer" >> $env:GITHUB_OUTPUT
          "blockmap=$blockmap" >> $env:GITHUB_OUTPUT
          "checksum=$checksum" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          INSTALLER: ${{ steps.assets.outputs.installer }}
          BLOCKMAP: ${{ steps.assets.outputs.blockmap }}
          CHECKSUM: ${{ steps.assets.outputs.checksum }}
        run: |
          if (gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $env:RELEASE_TAG $env:INSTALLER $env:BLOCKMAP $env:CHECKSUM `
              --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $env:RELEASE_TAG $env:INSTALLER $env:BLOCKMAP $env:CHECKSUM `
              --repo $env:GITHUB_REPOSITORY `
              --verify-tag `
              --generate-notes `
              --title "GTD Flow $env:RELEASE_TAG"
          }
