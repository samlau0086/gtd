<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>设置 GTD Flow 桌面客户端</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, "Microsoft YaHei", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #eef7f5; background: radial-gradient(circle at 20% 10%, #214744, #111516 52%); }
      main { width: min(520px, calc(100vw - 40px)); padding: 38px; border: 1px solid #34504e; border-radius: 22px; background: rgba(20, 29, 29, .94); box-shadow: 0 28px 70px #0008; }
      .logo { width: 64px; height: 64px; display: grid; place-items: center; border-radius: 16px; color: #102120; background: #69d2c8; font-size: 34px; font-weight: 850; box-shadow: inset 0 0 0 1px #cafffa77; }
      h1 { margin: 22px 0 8px; font-size: 27px; }
      p { margin: 0 0 26px; color: #a9bcba; line-height: 1.65; }
      label { display: grid; gap: 9px; color: #d9e7e5; font-weight: 650; }
      input { width: 100%; padding: 13px 14px; color: #f8fffe; background: #0c1112; border: 1px solid #3d5755; border-radius: 10px; outline: none; font: inherit; }
      input:focus { border-color: #69d2c8; box-shadow: 0 0 0 3px #69d2c822; }
      button { width: 100%; margin-top: 18px; padding: 13px; border: 0; border-radius: 10px; color: #0b2724; background: #69d2c8; font: 700 15px inherit; cursor: pointer; }
      button:disabled { opacity: .55; cursor: wait; }
      output { display: block; min-height: 22px; margin-top: 12px; color: #ff9c9c; font-size: 13px; }
      small { display: block; margin-top: 20px; color: #718482; line-height: 1.55; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">G</div>
      <h1>连接你的 GTD Flow</h1>
      <p>桌面客户端会加载现有服务，并在后台维护今天到期任务的任务栏数字。</p>
      <form>
        <label>
          GTD Flow 服务地址
          <input name="serverUrl" type="url" placeholder="https://gtd.example.com" required autofocus />
        </label>
        <button type="submit">连接并打开</button>
        <output role="alert"></output>
      </form>
      <small>关闭窗口后客户端会隐藏任务栏窗口并驻留系统托盘。点击托盘图标可重新打开；请选择托盘菜单中的“退出”来完全结束。</small>
    </main>
    <script>
      const form = document.querySelector("form");
      const button = document.querySelector("button");
      const output = document.querySelector("output");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        output.textContent = "";
        button.disabled = true;
        try {
          await window.gtdDesktop.saveServerUrl(new FormData(form).get("serverUrl"));
        } catch (error) {
          output.textContent = error && error.message ? error.message : "无法保存服务地址";
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
