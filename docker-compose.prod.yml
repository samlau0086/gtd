name: gtd-flow

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gtdflow}
      POSTGRES_USER: ${POSTGRES_USER:-gtdflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gtdflow} -d ${POSTGRES_DB:-gtdflow}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-gtdflow}
      PGUSER: ${POSTGRES_USER:-gtdflow}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AI_ENCRYPTION_KEY: ${AI_ENCRYPTION_KEY:?AI_ENCRYPTION_KEY is required}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?BOOTSTRAP_TOKEN is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    ports:
      - "127.0.0.1:${APP_PORT:-3300}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  reminder-worker:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    command: ["node", "dist-worker/reminders.mjs"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-gtdflow}
      PGUSER: ${POSTGRES_USER:-gtdflow}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      AI_ENCRYPTION_KEY: ${AI_ENCRYPTION_KEY:?AI_ENCRYPTION_KEY is required}
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}

volumes:
  postgres_data:
    name: gtd-flow-postgres
